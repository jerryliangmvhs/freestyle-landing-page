<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon.png">
    <title>Jerry Liang - Welcome</title>
</head>
<style>
    @font-face {
        font-family: chinese-cyberpunk;
        src: url("chinese-cyberpunk.ttf");
    }
    .exhibit{
       width: 100% !important;
       height: 100% !important;
    }
    body{
        margin: 0;
        width: 100vw;
        height: 100vh;
    }
    #loadingScreen{
        width: 100vw;
        height: 100vh;
        position: absolute;
        z-index: 999;
        background-color: black;
        opacity: 1;
        transition: opacity 2.5s ease;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    #loadingText{
        color: white;
        text-align: center;
        font-family: chinese-cyberpunk;
        font-size: 3em;
    }
    #loadingScreen.hidden{
       opacity: 0;
       pointer-events: none;
    }
    #outroScreen{
        position: absolute;
        z-index: 900;
        pointer-events: none;
        opacity: 0;
        width: 100vw;
        height: 100vh;
        background-color: black;
        transition: opacity 2.5s ease;
    }
    #outroScreen.show{
        opacity: 1;
    }
</style>
<body>
    <div id = "loadingScreen">
        <h1 id = "loadingText">Loading...</h1>
    </div>
    <div id = "outroScreen">

    </div>
    <canvas id = "exhibit" class = "exhibit"></canvas>
    <script type="module" src="/main.js"></script>
</body>
</html>

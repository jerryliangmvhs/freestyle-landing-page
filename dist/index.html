<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/assets/favicon-DstX19g1.png">
    <title>Jerry Liang - Welcome</title>
  <script type="module" crossorigin src="/assets/index-B1u_CN5E.js"></script>
</head>
<style>
    @font-face {
        font-family: chinese-cyberpunk;
        src: url("/assets/chinese-cyberpunk-DU-Pk81J.ttf");
    }
    @font-face {
        font-family: dale-adventure;
        src: url("/assets/dale-adventure-Dh3UPq-m.ttf");
    }
    .exhibit{
       width: 100% !important;
       height: 100% !important;
    }
    body{
        margin: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
    }
    #loadingScreen{
        width: 100vw;
        height: 100vh;
        position: absolute;
        z-index: 999;
        background-color: black;
        opacity: 1;
        transition: opacity 2.5s ease;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    #loadingText{
        color: white;
        text-align: center;
        font-family: chinese-cyberpunk;
        font-size: 3em;
    }
    #loadingScreen.hidden{
       opacity: 0;
       pointer-events: none;
    }
    #outroScreen{
        position: absolute;
        z-index: 900;
        pointer-events: none;
        opacity: 0;
        width: 100vw;
        height: 100vh;
        background-color: black;
        transition: opacity 2.5s ease;
    }
    #outroScreen.show{
        opacity: 1;
    }
    #caption{
        position: absolute;
        color: white;
        text-align: center;
        pointer-events: none;
        width: 100%;
        font-family: dale-adventure, Arial, Helvetica, sans-serif;
        top: 90vh;
        font-size: clamp(20px,2vw,100px);
        transition: opacity 1.5s ease;
    }
    #caption.hidden{
        opacity: 0;
    }
    #buttons{
        position: absolute;
        top: 20px;
        right: 20px;
    }
    #buttons button{
        width: 50px;
        height: 50px;
        padding: 0;
        background: none;
        border: none;
        margin: 0;
        cursor: pointer;
    }
    #buttons img{
        width: 100%;
        height: 100%;
        cursor: pointer;
    }

</style>
<body>
    <audio id = "backgroundMusic" preload="auto">
        <source src = "lofi-background.mp3" type = "audio/mp3">
    </audio>
    <audio id = "clickSound" preload="auto">
        <source src = "click.mp3" type = "audio/mp3">
    </audio>
    <div id = "loadingScreen">
        <h1 id = "loadingText">Loading...</h1>
    </div>
    <div id = "buttons">
        <button class = "musicButton" id = "musicButton" onclick = "toggleMusic()"><img src = "play-button.png"></button>
        <button class = "2dWebsiteButton" onclick = "redirect2D()"><img src = "2d-website-button.png"></button>
    </div>
    <div id = "outroScreen"></div>
    <p id = "caption">Click and drag around to interact!</p>
    <canvas id = "exhibit" class = "exhibit"></canvas>

    <script>
    let isPlaying = false;
    const musicButton = document.getElementById("musicButton");
    const backgroundMusic = document.getElementById("backgroundMusic");
    const clickSound = document.getElementById("clickSound");
    function toggleMusic(){
        clickSound.play();
        if(isPlaying){
            isPlaying = false;
            musicButton.innerHTML = '<img src = "play-button.png">';
            backgroundMusic.pause();
        }
        else if(!isPlaying){
            isPlaying = true;
            musicButton.innerHTML = '<img src = "pause-button.png">';
            backgroundMusic.play();
        }
    }
    function redirect2D(){
        clickSound.play();
        setTimeout(()=>{
            location.assign('https://freestyleacademy.rocks/~JerryL/home-2d');
        },500);
    }
</script>
</body>
</html>
